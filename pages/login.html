<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Entrar - Pendrive Forum</title>

<link rel="icon" href="../assets/favicon.png">
<link rel="stylesheet" href="../style.css">

</head>

<body>

<header>

<div class="topbar">

<div class="logo-area">

<img src="../assets/logo.png" class="logo">

<div class="logo-text">
<h1>Pendrive Forum</h1>
<p>Conectando gerações da tecnologia.</p>
</div>

</div>

</div>

</header>

<div class="wrapper">

<main class="content">

<div class="panel">

<h2>Entrar</h2>

<div class="panel-content">

<form id="loginForm">

<label>E-mail</label>

<input
type="email"
id="email"
required>

<br><br>

<label>Senha</label>

<input
type="password"
id="senha"
required>

<br><br>

<button
type="submit"
class="glass-button">

Entrar

</button>

</form>

<p style="margin-top:20px">

Não possui uma conta?

<a href="cadastro.html">

Cadastre-se

</a>

</p>

</div>

</div>

</main>

</div>

<script type="module">

import { login } from "../firebase.js";

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const email=document.getElementById("email").value;

    const senha=document.getElementById("senha").value;

    try{

        await login(email,senha);

        window.location="../index.html";

    }

    catch(erro){

        alert("E-mail ou senha inválidos.");

        console.error(erro);

    }

});

</script>

</body>
</html>
